name: Build Passarices APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages and audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip ffmpeg python3 curl
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Download Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Download ESC-50 real audio dataset
        run: |
          mkdir -p external
          curl -L --retry 5 --retry-delay 10 -o external/esc50.zip https://github.com/karolpiczak/ESC-50/archive/refs/heads/master.zip
          unzip -q external/esc50.zip -d external
          test -d external/ESC-50-master/audio
          test -f external/ESC-50-master/meta/esc50.csv

      - name: Build real audio catalog
        run: |
          python3 tools/build_audio_catalog.py --esc50-dir external/ESC-50-master --out-assets app/src/main/assets --docs-dir docs

      - name: Build signed APK
        run: |
          gradle --no-daemon assembleRelease

      - name: Verify APK signatures and alignment
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/Passarices-0.4.0.apk
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -p 4 dist/Passarices-0.4.0.apk
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs dist/Passarices-0.4.0.apk | tee dist/apksigner-verify.txt
          sha256sum dist/Passarices-0.4.0.apk | tee dist/Passarices-0.4.0.apk.sha256
          cp docs/audio_manifest_0.4.0.json dist/audio_manifest_0.4.0.json
          cp docs/audio_report_0.4.0.md dist/audio_report_0.4.0.md

      - name: Upload APK and reports
        uses: actions/upload-artifact@v4
        with:
          name: Passarices-0.4.0-APK-and-reports
          path: dist/*
          retention-days: 30
